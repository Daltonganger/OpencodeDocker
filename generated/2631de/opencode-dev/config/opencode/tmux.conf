# Use tmux's own terminfo entry inside the session.
set -g default-terminal "tmux-256color"
set -g set-titles on
set -g set-titles-string "OpenCode · 2631"
setw -g automatic-rename off

# Enable RGB/truecolor where supported.
set -as terminal-features ",xterm-256color:RGB"
set -as terminal-features ",xterm-kitty:RGB"
set -ga terminal-overrides ",xterm-256color:RGB"
set -ga terminal-overrides ",xterm-kitty:RGB"

# Avoid garbled OpenCode output with passthrough.
set -g allow-passthrough off

# Make Escape immediate inside ttyd/tmux sessions.
set -sg escape-time 0
